version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: fleet-postgres

    restart: always

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

      POSTGRES_DB: fleet_dispatch

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7-alpine

    container_name: fleet-redis

    restart: always

    ports:

      - "6379:6379"

  backend:

    build: .

    container_name: fleet-backend

    depends_on:

      - postgres

      - redis

    ports:

      - "3000:3000"

    env_file:

      - .env

    volumes:

      - .:/app

      - /app/node_modules

    command: npm run dev

volumes:

  postgres_data: